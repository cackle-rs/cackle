name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: '-D warnings'

jobs:
  test-stable:
    name: Test x86_64-linux stable
    # bubblewrap is broken on Ubuntu 24.04
    # update to ubuntu-latest once this is solved or Ubuntu 26.04 is available on GitHub
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        id: rust-toolchain
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}
      - run: sudo apt install bubblewrap
      - run: cargo build --profile ci --no-default-features
      - run: cargo test --profile ci

  clippy:
    name: Clippy
    # bubblewrap is broken on Ubuntu 24.04
    # update to ubuntu-latest once this is solved or Ubuntu 26.04 is available on GitHub
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@stable
      id: rust-toolchain
      with:
        components: clippy
    - uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-clippy-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}
    - run: cargo clippy --target x86_64-unknown-linux-gnu

  rustfmt:
    name: Check formatting
    # bubblewrap is broken on Ubuntu 24.04
    # update to ubuntu-latest once this is solved or Ubuntu 26.04 is available on GitHub
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt
    - run: cargo fmt --all -- --check
